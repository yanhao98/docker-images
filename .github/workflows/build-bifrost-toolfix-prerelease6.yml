name: build-bifrost-toolfix-prerelease6

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout patched bifrost source
        uses: actions/checkout@v6
        with:
          repository: yanhao98/bifrost
          ref: toolfix-prerelease6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push patched image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./transports/Dockerfile.local
          push: true
          tags: ghcr.io/yanhao98/bifrost:toolfix-prerelease6
          labels: |
            org.opencontainers.image.source=https://github.com/yanhao98/bifrost
